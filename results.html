<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Результаты анализов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { font-size: 28px; margin-bottom: 5px; color: #2c3e50; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .patient-info {
            background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px;
        }
        .section-title {
            font-weight: 700; font-size: 18px; margin: 20px 0 10px; color: #2c3e50;
        }
        .result-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; font-size: 15px;
        }
        .test-name { flex: 2; font-weight: 500; }
        .test-value { flex: 1; text-align: center; font-weight: 600; }
        .test-status { flex: 1; text-align: right; font-weight: 600; font-size: 14px; }
        .status-normal { color: #27ae60; } .status-low { color: #e67e22; } .status-high { color: #e74c3c; }
        .status-text { color: #888; }
        .conclusion-card {
            background: #fef9e7; border-left: 6px solid #f1c40f; padding: 15px; border-radius: 10px; margin-bottom: 15px;
        }
        .conclusion-card.critical { background: #ffe5e5; border-left-color: #e74c3c; }
        .conclusion-card.high { background: #ffeaea; border-left-color: #e74c3c; }
        .conclusion-card.medium { background: #fef9e7; border-left-color: #f39c12; }
        .conclusion-card.low { background: #eafaf1; border-left-color: #27ae60; }
        .conclusion-card strong { display: block; font-size: 16px; margin-bottom: 5px; }
        .btn {
            width: 100%; background: #3498db; color: white; border: none; padding: 12px; border-radius: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 20px;
        }
        .btn:hover { background: #2980b9; }
        .small-note { margin-top: 15px; font-size: 12px; color: #888; text-align: center; }
        a.back-link { display: block; margin-top: 10px; text-align: center; color: #3498db; text-decoration: none; font-size: 14px; }
        a.back-link:hover { text-decoration: underline; }
        .supplement-item {
            background: #f4f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px;
            border-left: 4px solid #5dade2;
        }
        .danger-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 8px;
        }
        .danger-low { background: #d4edda; color: #155724; }
        .danger-medium { background: #fff3cd; color: #856404; }
        .danger-high { background: #f8d7da; color: #721c24; }
        .overall-box {
            margin-top:15px; padding:15px; background: #f0f0f0; border-radius:8px;
        }
    </style>
</head>

        // Демо пациент
        const demoPatient = {

            tests: ["Глюкоза натощак","Гликированный гемоглобин (HbA1c)","ТТГ","Свободный Т4","Ферритин","Витамин D 25-OH","Витамин B12","Общий анализ крови (ОАК) с лейкоформулой","ЭКГ"]
        };

        // Получение данных
        const params = new URLSearchParams(window.location.search);
        const dataParam = params.get('data');
        let patientData = null;
        try { if(dataParam) patientData = JSON.parse(decodeURIComponent(dataParam)); } catch(e){}
        if(!patientData || !patientData.tests || patientData.tests.length===0) {
            const stored = sessionStorage.getItem('checkupPlan');
            if(stored) try { patientData = JSON.parse(stored); } catch(e){}
        }
        if(!patientData || !patientData.tests || patientData.tests.length===0) patientData = demoPatient;

        let generatedResults = [];

        function getNormRange(analysis, gender) {
            const n = norms[analysis];
            if(!n) return null;
            let min = n.min, max = n.max;
            if(n.genderDep) {
                if(analysis==="Ферритин") { min = gender==='female'?10:30; max = gender==='female'?150:300; }
                else if(analysis==="Креатинин") { min = gender==='female'?45:60; max = gender==='female'?90:110; }
                else if(analysis==="Тестостерон общий") { min = gender==='female'?0.5:8; max = gender==='female'?2.5:35; }
                else if(analysis==="Пролактин") { min = 50; max = gender==='female'?500:400; }
            }
            return { min, max, unit: n.unit };
        }

        function generateValue(analysis, gender, symptoms) {
            const rangeData = getNormRange(analysis, gender);
            if(!rangeData) return null;
            const { min, max, unit } = rangeData;
            let lowBias=0, highBias=0;
            symptoms.forEach(s => {
                const dirs = symptomDirections[s];
                if(dirs && dirs[analysis]==='low') lowBias++;
                else if(dirs && dirs[analysis]==='high') highBias++;
            });
            let pNorm=60, pLow=20, pHigh=20;
            pLow += lowBias*15; pHigh += highBias*15;
            pNorm -= (lowBias+highBias)*15; if(pNorm<0) pNorm=0;
            const total = pNorm+pLow+pHigh;
            const rand = Math.random()*total;
            let type = rand < pNorm ? 'normal' : (rand < pNorm+pLow ? 'low' : 'high');
            const range = max - min;
            let value;
            if(type==='normal') value = min + Math.random()*range;
            else if(type==='low') {
                const lowMin = Math.max(0, min - 0.5*range);
                value = lowMin + Math.random()*(min - lowMin);
            } else {
                const highMax = max + 0.5*range;
                value = max + Math.random()*(highMax - max);
            }
            if(unit.includes('%') || ['нг/мл','пг/мл','мкЕд/мл'].includes(unit)) value = Math.round(value*10)/10;
            else if(['ммоль/л','мкмоль/л','пмоль/л','нмоль/л'].includes(unit)) value = Math.round(value*100)/100;
            else if(['Ед/л','г/л','мМЕ/л'].includes(unit)) value = Math.round(value*10)/10;
            else value = Math.round(value*10)/10;
            return { value, type, unit };
        }

        function matchCondition(rule, symptoms, resultsMap) {
            const hasSymptoms = rule.symptoms.every(s => symptoms.includes(s));
            if(!hasSymptoms) return false;
            if(rule.results) {
                for(const [test, direction] of Object.entries(rule.results)) {
                    if(!resultsMap[test] || resultsMap[test] !== direction) return false;
                }
            }
            return true;
        }

        function generateConclusion(symptoms, resultsMap) {
            const container = document.getElementById('conclusion-container');
            const matched = diagnosticRules.filter(rule => matchCondition(rule, symptoms, resultsMap));

            if (matched.length > 0) {
                const allDoctors = new Set();
                matched.forEach(rule => rule.doctors.forEach(doc => allDoctors.add(doc)));
                const doctorsList = Array.from(allDoctors).join(', ');

                let html = '<div class="section-title">📋 Возможные состояния</div>';
                matched.forEach(rule => {
                    const dangerEmoji = { low:'🟢', medium:'🟡', high:'🔴', critical:'⚠️' };
                    html += `
                        <div class="conclusion-card ${rule.danger}">
                            <strong>${dangerEmoji[rule.danger] || ''} ${rule.name}</strong>
                            <span>Опасность: <b>${rule.danger==='low'?'Низкая':rule.danger==='medium'?'Средняя':rule.danger==='high'?'Высокая':'Критическая'}</b></span>
                        </div>
                    `;
                });
                // Единый блок с врачами (без мелкого шрифта)
                html += `
                    <div class="overall-box">
                        <strong>👨‍⚕️ Рекомендуемые врачи:</strong> ${doctorsList}<br>
                        На основе найденных состояний рекомендуется записаться на приём.
                    </div>
                `;
                container.innerHTML = html;
                return;
            }

            // Без точных диагнозов – рекомендации по витаминам
            const recommendations = [];
            let maxDanger = 'low';
            const doctorsSet = new Set();

            for (const [test, result] of Object.entries(resultsMap)) {
                if (result === 'normal' || result === 'text') continue;
                const mapping = supplementMap[test];
                if (!mapping) continue;
                const directionInfo = mapping[result];
                if (!directionInfo) continue;
                recommendations.push({
                    test,
                    ...directionInfo,
                    status: result
                });
                directionInfo.doctors.forEach(doc => doctorsSet.add(doc));
                if (directionInfo.danger === 'high') maxDanger = 'high';
                else if (directionInfo.danger === 'medium' && maxDanger !== 'high') maxDanger = 'medium';
            }

            let html = '<div class="section-title">💊 Рекомендации по витаминам и микроэлементам</div>';

            if (recommendations.length === 0) {
                html += '<p>Все показатели в норме – специфических добавок не требуется. Поддерживайте сбалансированное питание.</p>';
                doctorsSet.add("Терапевт");
            } else {
                recommendations.forEach(rec => {
                    const statusText = rec.status === 'low' ? 'Понижен' : 'Повышен';
                    html += `
                        <div class="supplement-item">
                            <strong>${rec.test} (${statusText})</strong><br>
                            💡 <b>Что принимать:</b> ${rec.supplement}<br>
                            🕒 <b>Длительность:</b> ${rec.duration}<br>
                            📝 ${rec.note}
                            <span class="danger-badge danger-${rec.danger}">${rec.danger === 'low' ? 'Низкая угроза' : rec.danger === 'medium' ? 'Средняя угроза' : 'Высокая угроза'}</span>
                        </div>
                    `;
                });
            }

            const overallText = maxDanger === 'high' ? 'Высокая – требуется срочная консультация врача' :
                               maxDanger === 'medium' ? 'Средняя – рекомендуется визит к специалисту в плановом порядке' :
                               'Низкая – можно корректировать дефициты самостоятельно, но консультация терапевта не помешает';
            const doctorsList = Array.from(doctorsSet).join(', ');

            // Текст "Даже при низкой угрозе..." теперь обычным шрифтом
            html += `
                <div class="overall-box">
                    <strong>📊 Общая оценка угрозы для здоровья:</strong> ${overallText}<br>
                    <strong>👨‍⚕️ Рекомендуемые врачи:</strong> ${doctorsList || 'Терапевт'}
                </div>
            `;

            container.innerHTML = html;
        }

        function renderResults() {
            const patientDiv = document.getElementById('patient-info');
            const resultsDiv = document.getElementById('results-container');
            const refreshBtn = document.getElementById('refresh-btn');
            const gender = patientData.gender;
            const genderStr = gender==='male'?'Мужской':'Женский';
            patientDiv.innerHTML = `<div class="patient-info">
                <strong>Пациент:</strong> ${genderStr}, возраст ${patientData.age} лет<br>
                <strong>Симптомы:</strong> ${patientData.symptoms.length ? patientData.symptoms.join(', ') : 'не указаны'}
            </div>`;
            const symptoms = patientData.symptoms;
            generatedResults = [];
            let html = '';
            let hasNumeric = false;
            const resultsMap = {};
            patientData.tests.forEach(test => {
                const res = generateValue(test, gender, symptoms);
                if(res) {
                    hasNumeric = true;
                    generatedResults.push({ test, ...res });
                    resultsMap[test] = res.type;
                    const statusText = res.type==='normal'?'Норма':(res.type==='low'?'Понижен':'Повышен');
                    const statusClass = `status-${res.type}`;
                    html += `<div class="result-item">
                        <span class="test-name">${test}</span>
                        <span class="test-value">${res.value} ${res.unit}</span>
                        <span class="test-status ${statusClass}">${statusText}</span>
                    </div>`;
                } else {
                    generatedResults.push({ test, value:'—', unit:'', type:'text' });
                    resultsMap[test] = 'text';
                    html += `<div class="result-item">
                        <span class="test-name">${test}</span>
                        <span class="test-value">—</span>
                        <span class="test-status status-text">см. заключение</span>
                    </div>`;
                }
            });
            resultsDiv.innerHTML = html;
            refreshBtn.style.display = hasNumeric ? 'block' : 'none';

            generateConclusion(patientData.symptoms, resultsMap);
        }

        // Первый запуск
        renderResults();
    </script>
</body>
</html>
