<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамика анализов — сравнение и рекомендации</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #dbeafe 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 24px; padding: 35px; max-width: 800px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.08); }
        h1 { font-size: 28px; font-weight: 800; color: #1a1a2e; }
        .subtitle { color: #6b7280; margin-bottom: 30px; font-size: 15px; }
        .profile-row { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .profile-field label { font-weight: 700; font-size: 13px; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
        .gender-options { display: flex; gap: 0; background: #f3f4f6; border-radius: 14px; padding: 5px; border: 2px solid #e5e7eb; }
        .gender-option { flex: 1; text-align: center; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 15px; color: #6b7280; transition: all 0.2s; }
        .gender-option.selected { background: white; color: #1a1a2e; box-shadow: 0 2px 8px rgba(0,0,0,0.08); font-weight: 700; }
        input[type="number"] { width: 100%; padding: 14px 16px; border-radius: 14px; border: 2px solid #e5e7eb; font-size: 15px; background: #f9fafb; }
        .upload-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .upload-box { flex: 1; min-width: 200px; border: 2px dashed #c7d2fe; border-radius: 16px; padding: 30px; text-align: center; background: #f8faff; cursor: pointer; }
        .upload-box.loaded { border-color: #10b981; background: #f0fdf4; }
        .upload-box input { display: none; }
        .btn { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 16px; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer; margin-top: 12px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .section-title { font-weight: 700; font-size: 17px; margin: 24px 0 10px; color: #1a1a2e; }
        .compare-row { display: flex; justify-content: space-between; align-items: center; background: #f9fafb; padding: 14px 18px; border-radius: 12px; margin-bottom: 8px; }
        .compare-name { flex: 2; font-weight: 600; }
        .compare-values { flex: 2; text-align: center; }
        .compare-old { color: #6b7280; font-size: 13px; }
        .compare-new { font-weight: 700; }
        .compare-arrow { flex: 0.5; text-align: center; font-size: 20px; }
        .arrow-up { color: #10b981; } .arrow-down { color: #ef4444; }
        .badge-improved { background: #d1fae5; color: #065f46; padding: 4px 10px; border-radius: 20px; font-weight: 700; font-size: 12px; }
        .badge-worsened { background: #fee2e2; color: #991b1b; }
        .badge-stable { background: #f3f4f6; color: #6b7280; }
        .badge-new { background: #dbeafe; color: #1e40af; }
        .badge-changed { background: #e0f2fe; color: #0c4a6e; }
        .overall-box { margin-top: 18px; padding: 16px; background: #f1f5f9; border-radius: 12px; font-weight: 600; }
        .conclusion-card { background: #fffbeb; border-left: 5px solid #f59e0b; padding: 16px; border-radius: 12px; margin-bottom: 12px; }
        .supplement-item { background: #f0f9ff; padding: 14px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #3b82f6; }
        .small-note { margin-top: 14px; font-size: 12px; color: #9ca3af; text-align: center; }
        a.back-link { display: block; margin-top: 12px; text-align: center; color: #6366f1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Динамика анализов</h1>
        <p class="subtitle">Загрузите два PDF-файла (старый и новый) — мы покажем изменения и дадим рекомендации</p>
        <div id="patientInfoBox" class="patient-card" style="display:none;"></div>
        <div id="manualInputBox">
            <div class="profile-row">
                <div class="profile-field">
                    <label>Пол</label>
                    <div class="gender-options" id="genderSelect">
                        <div class="gender-option selected" data-value="female">👩 Женский</div>
                        <div class="gender-option" data-value="male">👨 Мужской</div>
                    </div>
                    <input type="hidden" name="gender" value="female">
                </div>
                <div class="profile-field">
                    <label for="ageInput">Возраст</label>
                    <input type="number" id="ageInput" placeholder="Введите возраст" min="0" max="120" value="30">
                </div>
            </div>
        </div>
        <div class="upload-row">
            <div class="upload-box" id="uploadOld">
                <div class="label">📄 Старый анализ</div>
                <p class="filename" id="oldFilename"></p>
                <input type="file" id="oldFileInput" accept=".pdf" />
            </div>
            <div class="upload-box" id="uploadNew">
                <div class="label">📄 Новый анализ</div>
                <p class="filename" id="newFilename"></p>
                <input type="file" id="newFileInput" accept=".pdf" />
            </div>
        </div>
        <button class="btn" id="compareBtn" disabled>🔍 Сравнить анализы</button>
        <div id="loading" style="display:none;">⏳ Обрабатываем PDF...</div>
        <div id="resultsContainer" style="display:none;">
            <div id="comparisonList"></div>
            <div id="summary"></div>
            <div id="conclusion"></div>
        </div>
        <div class="small-note">⚕️ Автоматическое сравнение. При неточностях сверяйтесь с оригиналами.</div>
        <a class="back-link" href="index.html">← Вернуться на главную</a>
    </div>

    <script src="database.js"></script>
    <script>
        const genderInput = document.querySelector('input[name="gender"]');
        const ageInput = document.getElementById('ageInput');
        const patientInfoBox = document.getElementById('patientInfoBox');
        const manualInputBox = document.getElementById('manualInputBox');

        document.querySelectorAll('#genderSelect .gender-option').forEach(div => {
            div.addEventListener('click', () => {
                document.querySelectorAll('#genderSelect .gender-option').forEach(d => d.classList.remove('selected'));
                div.classList.add('selected');
                genderInput.value = div.dataset.value;
            });
        });

        let oldFile = null, newFile = null;
        document.getElementById('uploadOld').addEventListener('click', () => document.getElementById('oldFileInput').click());
        document.getElementById('oldFileInput').addEventListener('change', function() {
            oldFile = this.files[0];
            if (oldFile && oldFile.type === 'application/pdf') {
                document.getElementById('oldFilename').textContent = oldFile.name;
                document.getElementById('uploadOld').classList.add('loaded');
            }
            checkReady();
        });
        document.getElementById('uploadNew').addEventListener('click', () => document.getElementById('newFileInput').click());
        document.getElementById('newFileInput').addEventListener('change', function() {
            newFile = this.files[0];
            if (newFile && newFile.type === 'application/pdf') {
                document.getElementById('newFilename').textContent = newFile.name;
                document.getElementById('uploadNew').classList.add('loaded');
            }
            checkReady();
        });

        function checkReady() {
            document.getElementById('compareBtn').disabled = !(oldFile && newFile);
        }

        async function extractTextFromPDF(file) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = '';
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const items = textContent.items;
                const lines = [];
                let currentLine = [];
                let lastY = null;
                for (const item of items) {
                    const y = Math.round(item.transform[5] * 10) / 10;
                    if (lastY !== null && Math.abs(y - lastY) > 2) {
                        lines.push(currentLine.map(it => it.str).join(' '));
                        currentLine = [];
                    }
                    currentLine.push(item);
                    lastY = y;
                }
                if (currentLine.length > 0) lines.push(currentLine.map(it => it.str).join(' '));
                fullText += lines.join('\n') + '\n';
            }
            return fullText;
        }

        function extractPatientInfo(text) {
            const lowerText = text.toLowerCase();
            let gender = null;
            let age = null;
            if (lowerText.includes('пол: мужской') || lowerText.includes('пол мужской') || lowerText.includes('мужской')) {
                gender = 'male';
            } else if (lowerText.includes('пол: женский') || lowerText.includes('пол женский') || lowerText.includes('женский')) {
                gender = 'female';
            }
            const ageMatch = text.match(/\((\d{1,3})\s*(?:год|г|лет|года|г\.)/i);
            if (ageMatch) {
                age = parseInt(ageMatch[1], 10);
            } else {
                const ageMatch2 = text.match(/(?:возраст|age)\s*:?\s*(\d{1,3})/i);
                if (ageMatch2) age = parseInt(ageMatch2[1], 10);
            }
            const birthMatch = text.match(/дата рождения\s*:?\s*(\d{2})[.\-](\d{2})[.\-](\d{4})/i);
            if (birthMatch && !age) {
                const day = parseInt(birthMatch[1]);
                const month = parseInt(birthMatch[2]);
                const year = parseInt(birthMatch[3]);
                const birthDate = new Date(year, month - 1, day);
                const today = new Date();
                age = today.getFullYear() - birthDate.getFullYear();
                if (today.getMonth() < birthDate.getMonth() || (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())) {
                    age--;
                }
            }
            return { gender, age };
        }

        function parseText(text, patientSex, patientAge) {
            const lines = text.split('\n');
            const results = {};
            const usedTests = new Set();
            for (let i = 0; i < lines.length; i++) {
                const test = window.findTestByAlias(lines[i]);
                if (!test || usedTests.has(test.canonicalName)) continue;
                let valueInfo = window.extractNumericResult(lines[i], test, patientSex, patientAge);
                if (!valueInfo && i + 1 < lines.length) {
                    valueInfo = window.extractNumericResult(lines[i + 1], test, patientSex, patientAge);
                }
                if (valueInfo) {
                    results[test.canonicalName] = valueInfo;
                    usedTests.add(test.canonicalName);
                }
            }
            return results;
        }

        function generateConclusion(analysisResults) {
            const container = document.getElementById('conclusion');
            if (!analysisResults || Object.keys(analysisResults).length === 0) {
                container.innerHTML = '<p>Нет данных для заключения.</p>';
                return;
            }
            const resultsMap = {};
            const totalCount = Object.keys(analysisResults).length;
            let abnormalCount = 0;
            for (const [name, data] of Object.entries(analysisResults)) {
                resultsMap[name] = data.status;
                if (data.status !== 'normal') abnormalCount++;
            }

            const matchedRules = window.diagnosticRules.filter(rule =>
                Object.entries(rule.results).every(([test, dir]) => resultsMap[test] === dir)
            );

            let maxDanger = 'low';
            const allDoctors = new Set();
            let html = `<div class="section-title">📋 Заключение по новому анализу</div>`;
            html += `<p>🔢 <b>Всего показателей:</b> ${totalCount} | <b>Отклонений:</b> ${abnormalCount}</p>`;

            if (matchedRules.length > 0) {
                const grouped = { high: [], medium: [], low: [] };
                matchedRules.forEach(r => {
                    if (r.danger === 'high') grouped.high.push(r);
                    else if (r.danger === 'medium') grouped.medium.push(r);
                    else grouped.low.push(r);
                    r.doctors.forEach(d => allDoctors.add(d));
                    if (r.danger === 'high') maxDanger = 'high';
                    else if (r.danger === 'medium' && maxDanger !== 'high') maxDanger = 'medium';
                });
                if (grouped.high.length) {
                    html += `<div class="section-title">🔴 Что критически</div>`;
                    grouped.high.forEach(r => html += `<div class="conclusion-card high"><strong>🔴 ${r.name}</strong></div>`);
                }
                if (grouped.medium.length) {
                    html += `<div class="section-title">🟡 Что требует внимания</div>`;
                    grouped.medium.forEach(r => html += `<div class="conclusion-card medium"><strong>🟡 ${r.name}</strong></div>`);
                }
                if (grouped.low.length) {
                    html += `<div class="section-title">🟢 Низкий риск</div>`;
                    grouped.low.forEach(r => html += `<div class="conclusion-card low"><strong>🟢 ${r.name}</strong></div>`);
                }
            }

            const recommendations = [];
            for (const [name, data] of Object.entries(analysisResults)) {
                if (data.status === 'normal') continue;
                const mapping = window.supplementMap[name];
                if (!mapping) continue;
                const dirInfo = mapping[data.status];
                if (!dirInfo) continue;
                recommendations.push({ test: name, ...dirInfo, status: data.status });
                dirInfo.doctors.forEach(d => allDoctors.add(d));
                if (dirInfo.danger === 'high') maxDanger = 'high';
                else if (dirInfo.danger === 'medium' && maxDanger !== 'high') maxDanger = 'medium';
            }

            if (recommendations.length > 0) {
                html += '<div class="section-title">💊 Рекомендации</div>';
                recommendations.forEach(rec => {
                    const st = rec.status === 'low' ? 'Понижен' : 'Повышен';
                    html += `<div class="supplement-item"><strong>${rec.test} (${st})</strong><br>
                        📝 <b>Что это значит:</b> ${rec.description || 'Нет описания'}<br>
                        ⚠️ <b>Опасность:</b> ${rec.dangerDesc || rec.note || 'Оценивается врачом'}<br>
                        💡 <b>Рекомендация:</b> ${rec.supplement}<br>
                        🕒 <b>Длительность:</b> ${rec.duration}<br>
                        👨‍⚕️ <b>Врач:</b> ${rec.doctors.join(', ')}
                        <span class="danger-badge danger-${rec.danger}">${rec.danger==='low'?'Низкая угроза':'Высокая угроза'}</span></div>`;
                });
            } else {
                html += '<div class="section-title">💊 Профилактические рекомендации</div>';
                window.preventiveRecommendations.forEach(rec => {
                    html += `<div class="supplement-item"><strong>🟢 ${rec.supplement}</strong><br>
                        🕒 ${rec.duration}<br>
                        📝 ${rec.note || ''}</div>`;
                });
                allDoctors.add("Терапевт");
            }

            const overallText = maxDanger === 'high' ? '⚠️ Высокая — требуется срочная консультация врача!' :
                               maxDanger === 'medium' ? '🟡 Средняя — рекомендуется визит к специалисту' :
                               '🟢 Низкая — показатели в норме';
            html += `<div class="overall-box">
                <strong>📊 Общая оценка угрозы:</strong> ${overallText}<br>
                <strong>👨‍⚕️ Врачи:</strong> ${[...allDoctors].join(', ')}
            </div>`;
            container.innerHTML = html;
        }

        async function comparePDFs() {
            if (!oldFile || !newFile) return;
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';
            try {
                const oldText = await extractTextFromPDF(oldFile);
                const newText = await extractTextFromPDF(newFile);

                let patientInfo = extractPatientInfo(newText);
                if (!patientInfo.gender || !patientInfo.age) {
                    patientInfo = extractPatientInfo(oldText);
                }

                let patientSex = patientInfo.gender;
                let patientAge = patientInfo.age;

                if (patientSex && patientAge) {
                    patientInfoBox.innerHTML = `👤 <b>Пациент:</b> ${patientSex==='male'?'Мужчина':'Женщина'}, ${patientAge} лет (определено автоматически)`;
                    patientInfoBox.style.display = 'block';
                    manualInputBox.style.display = 'none';
                } else {
                    patientInfoBox.style.display = 'none';
                    manualInputBox.style.display = 'block';
                    patientSex = genderInput.value;
                    patientAge = parseInt(ageInput.value, 10) || 30;
                }

                const oldResults = parseText(oldText, patientSex, patientAge);
                const newResults = parseText(newText, patientSex, patientAge);

                const allTests = new Set([...Object.keys(oldResults), ...Object.keys(newResults)]);
                const comparison = [];
                for (const test of allTests) {
                    const old = oldResults[test];
                    const newer = newResults[test];
                    if (!newer) continue;
                    const oldValue = old ? old.value : null;
                    const change = oldValue !== null ? newer.value - oldValue : null;
                    let direction = 'stable', badge = '';
                    if (oldValue !== null && Math.abs(change) > 0.01) {
                        const oldStatus = old.status;
                        const newStatus = newer.status;
                        if (oldStatus !== newStatus) {
                            direction = newStatus === 'normal' ? 'improved' : 'worsened';
                            badge = direction === 'improved' ? 'Улучшился' : 'Ухудшился';
                        } else if (newStatus === 'normal' && oldStatus === 'normal') {
                            direction = Math.abs(change) / old.value > 0.1 ? 'changed' : 'stable';
                            badge = direction === 'changed' ? 'Изменился' : 'Стабильно';
                        } else {
                            direction = 'stable';
                            badge = 'Стабильно';
                        }
                    } else if (oldValue === null) {
                        direction = 'new';
                        badge = 'Новый';
                    } else {
                        badge = 'Стабильно';
                    }
                    comparison.push({ test, oldValue: old ? `${old.value} ${old.unit}` : '—', newValue: `${newer.value} ${newer.unit}`, change, direction, badge });
                }

                comparison.sort((a, b) => {
                    const order = { 'worsened': 0, 'improved': 1, 'changed': 2, 'new': 3, 'stable': 4 };
                    return order[a.direction] - order[b.direction];
                });

                const listDiv = document.getElementById('comparisonList');
                let html = '<div class="section-title">📈 Динамика показателей</div>';
                let improved = 0, worsened = 0, stable = 0, newTests = 0;
                comparison.forEach(item => {
                    let arrow = '→', arrowClass = 'arrow-same';
                    if (item.direction === 'improved') { arrow = '↓'; arrowClass = 'arrow-up'; improved++; }
                    else if (item.direction === 'worsened') { arrow = '↑'; arrowClass = 'arrow-down'; worsened++; }
                    else if (item.direction === 'changed') { arrow = item.change > 0 ? '↗' : '↘'; arrowClass = item.change > 0 ? 'arrow-down' : 'arrow-up'; stable++; }
                    else if (item.direction === 'new') { arrow = '🆕'; arrowClass = 'arrow-same'; newTests++; }
                    else { stable++; }
                    const badgeClass = item.direction === 'improved' ? 'badge-improved' : (item.direction === 'worsened' ? 'badge-worsened' : (item.direction === 'changed' ? 'badge-changed' : (item.direction === 'new' ? 'badge-new' : 'badge-stable')));
                    html += `<div class="compare-row">
                        <span class="compare-name">${item.test}</span>
                        <span class="compare-values">
                            <span class="compare-old">${item.oldValue}</span>
                            <span class="compare-arrow ${arrowClass}">${arrow}</span>
                            <span class="compare-new">${item.newValue}</span>
                        </span>
                        <span class="${badgeClass}">${item.badge}</span>
                    </div>`;
                });
                listDiv.innerHTML = html;
                document.getElementById('summary').innerHTML = `<div class="overall-box">
                    <strong>📊 Сводка изменений:</strong><br>
                    🟢 Улучшилось: ${improved}<br>
                    🔴 Ухудшилось: ${worsened}<br>
                    ⚪ Без изменений: ${stable}<br>
                    🆕 Новых: ${newTests}
                </div>`;

                generateConclusion(newResults);
                document.getElementById('resultsContainer').style.display = 'block';
            } catch (error) {
                alert('Ошибка: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        document.getElementById('compareBtn').addEventListener('click', comparePDFs);
    </script>
</body>
</html>
